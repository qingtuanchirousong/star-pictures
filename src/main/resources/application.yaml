server:
  port: 8123
  servlet:
    context-path: /api
spring:
  application:
    name: star-picture
  # 默认启用 local 配置（本地开发），部署时通过环境变量覆盖
  profiles:
    active: local
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/star_picture
    username: root
    password: 1234
  # redis配置
  redis:
    host: localhost
    port: 6379
    connect-timeout: 5000
    database: 0
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
# Knife4j 接口文档配置
knife4j:
  enable: true
  setting:
    language: zh_cn
swagger:
  enabled: true
# mybatis-plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDelete
      logic-delete-value: 1
      logic-not-delete-value: 0
#对象存储配置
tencent:
  cos:
    # 腾讯云 SecretId （通过环境变量或启动参数注入）
    secret-id: ${TENCENT_COS_SECRET_ID:}
    # 腾讯云 SecretKey
    secret-key: ${TENCENT_COS_SECRET_KEY:}
    # COS 地域
    region: ap-nanjing
    # COS Bucket 名称，格式：bucketname-appid
    bucket: star-picture-1432413398
    # COS 访问域名
    cdn-domain: https://star-picture-1432413398.cos.ap-nanjing.myqcloud.com
