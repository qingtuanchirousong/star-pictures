<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <title>Star Picture</title>
  <style>
    :root {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --text: #1a2332;
      --text-muted: #5c6b7f;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --border: #e2e8f0;
      --shadow: 0 1px 3px rgba(15, 23, 42, 0.08), 0 4px 14px rgba(15, 23, 42, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: linear-gradient(165deg, #e8f0ff 0%, var(--bg) 45%, #fafbfc 100%);
      color: var(--text);
      line-height: 1.6;
    }

    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem 2.25rem;
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
      background: var(--accent-soft);
      padding: 0.35rem 0.65rem;
      border-radius: 999px;
      margin-bottom: 1rem;
    }

    p {
      margin: 0;
      color: var(--text-muted);
      font-size: 1.05rem;
    }

    a {
      color: var(--accent);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <span class="badge">白天模式</span>
      <h1>Star Picture</h1>
      <p>欢迎使用。当前为明亮界面：浅色背景与高对比文字，便于日间阅读。</p>
    </div>
  </main>
</body>
</html>
